services:
  - type: web
    name: asistente-calculo
    runtime: python
    buildCommand: apt-get install -y tesseract-ocr tesseract-ocr-spa && pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: OPENAI_API_KEY
        sync: false
